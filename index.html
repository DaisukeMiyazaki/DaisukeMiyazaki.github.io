---
layout: default
title: Daisuke Miyazaki's Blog
---
<div class="blurb">
	<h1>{{page.title}}</h1>
	<p>Welcome. ようこそ。</p>
	<ul class="post">
		{% for post in site.posts %}
		<li>
			<span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
        	<a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
        	<br>
        	{{ post.excerpt }}
		</li>
		{% endfor %}
</div><!-- /.blurb -->
