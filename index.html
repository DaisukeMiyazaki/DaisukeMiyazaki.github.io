---
layout: default
---
<div class="home">
	<ul class="home">
		{% for tag in site.tags  %}
			{% if tag[0] == "art" %}
				{% for post in tag[1] %}
				<li class="home_post_intro">
					<span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
					<!--br-->
					<a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
					<br>
					{{ post.excerpt }}
				</li>
				{% endfor %}
			{% endif %}
		{% endfor %}
	</ul>
</div>
